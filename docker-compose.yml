services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    env_file: .env.production
    environment:
      - DATABASE_URL=postgresql://laith:${POSTGRES_PASSWORD}@db:5432/laith_credit
      - CORS_ORIGINS=https://laithanalytics.ai,https://www.laithanalytics.ai
      - FRONTEND_URL=http://frontend:80
      - BACKEND_URL=http://localhost:8000
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_API_URL: ""  # Empty = same origin (Nginx proxies /companies etc. to backend)
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: laith
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: laith_credit
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laith -d laith_credit"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
